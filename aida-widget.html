
<!-- AIDA FLOATING CHAT BUTTON -->
<style>
#aida-fab{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
#aida-btn{width:62px;height:62px;border-radius:50%;background:linear-gradient(135deg,#00d4ff,#7c3aed);border:none;cursor:pointer;box-shadow:0 8px 32px rgba(0,212,255,0.45);display:flex;align-items:center;justify-content:center;font-size:28px;transition:all .3s;animation:fabPulse 3s infinite}
#aida-btn:hover{transform:scale(1.1);box-shadow:0 12px 40px rgba(0,212,255,0.65)}
@keyframes fabPulse{0%,100%{box-shadow:0 8px 32px rgba(0,212,255,0.4)}50%{box-shadow:0 8px 52px rgba(0,212,255,0.75)}}
#aida-tooltip{background:linear-gradient(135deg,#0d1117,#1a2035);border:1px solid rgba(0,212,255,0.35);border-radius:12px;padding:10px 16px;color:#fff;font-size:13px;font-family:system-ui,sans-serif;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.5);display:flex;align-items:center;gap:8px;cursor:pointer}
#aida-tooltip .aida-dot{width:8px;height:8px;background:#00e676;border-radius:50%;flex-shrink:0;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>

<div id="aida-fab">
  <div id="aida-tooltip" onclick="openAida()">
    <div class="aida-dot"></div>
    <span>💬 <strong>Aida</strong> — Assistante PST</span>
  </div>
  <button id="aida-btn" onclick="openAida()" title="Parler à Aida">🤖</button>
</div>

<script>
// Hide tooltip after 6s
setTimeout(function(){
  var t=document.getElementById('aida-tooltip');
  if(t)t.style.display='none';
},6000);

// Show again after 40s
setTimeout(function(){
  var t=document.getElementById('aida-tooltip');
  if(t){t.style.display='flex';setTimeout(function(){if(t)t.style.display='none';},6000);}
},40000);

function openAida(){
  var w=420, h=620;
  var left=(screen.width-w)/2;
  var top=(screen.height-h)/2;
  window.open(
    'https://pst-telecom-production.up.railway.app/agent',
    'Aida PST',
    'width='+w+',height='+h+',left='+left+',top='+top+',resizable=yes,scrollbars=no,toolbar=no,menubar=no,location=no,status=no'
  );
}
</script>
<!-- FIN AIDA FLOATING CHAT -->
