<!-- AIDA CHAT PST -->
<style>
#aida-fab{position:fixed;bottom:24px;right:24px;z-index:9999}
#aida-btn{width:62px;height:62px;border-radius:50%;background:linear-gradient(135deg,#00d4ff,#7c3aed);border:none;cursor:pointer;box-shadow:0 8px 32px rgba(0,212,255,0.45);display:flex;align-items:center;justify-content:center;font-size:28px;animation:fabP 3s infinite}
@keyframes fabP{0%,100%{box-shadow:0 8px 32px rgba(0,212,255,0.4)}50%{box-shadow:0 8px 52px rgba(0,212,255,0.75)}}
#aida-box{position:fixed;bottom:100px;right:24px;z-index:9998;width:370px;height:560px;background:#0d1117;border:1px solid rgba(0,212,255,0.25);border-radius:20px;box-shadow:0 24px 80px rgba(0,0,0,0.7);display:none;flex-direction:column;overflow:hidden;font-family:system-ui,sans-serif}
#aida-box.open{display:flex;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.ah{padding:14px 16px;background:#111827;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ah-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#00d4ff,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ah h3{font-size:14px;font-weight:700;color:#e2e8f0;margin:0}
.ah p{font-size:11px;color:#64748b;margin:0}
.ah-cl{margin-left:auto;background:none;border:none;color:#64748b;font-size:22px;cursor:pointer;line-height:1;padding:0}
.ah-cl:hover{color:#e2e8f0}
.am{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;min-height:0}
.am::-webkit-scrollbar{width:3px}
.am::-webkit-scrollbar-thumb{background:#1e2a3a;border-radius:2px}
.mr{display:flex;gap:7px;max-width:90%}
.mr.u{align-self:flex-end;flex-direction:row-reverse}
.mr.a{align-self:flex-start}
.mv{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
.mr.a .mv{background:linear-gradient(135deg,#00d4ff,#7c3aed)}
.mr.u .mv{background:linear-gradient(135deg,#1e40af,#7c3aed)}
.mb{padding:9px 12px;border-radius:14px;font-size:12px;line-height:1.5;color:#e2e8f0}
.mr.a .mb{background:#131820;border:1px solid #1e2a3a;border-top-left-radius:4px}
.mr.u .mb{background:linear-gradient(135deg,#1e40af,#2563eb);border-top-right-radius:4px;color:#fff}
.mt{font-size:9px;color:#475569;margin-top:2px}
.mr.u .mt{text-align:right}
.td{display:flex;gap:7px;align-self:flex-start}
.td-d{padding:9px 12px;background:#131820;border:1px solid #1e2a3a;border-radius:14px;border-top-left-radius:4px;display:flex;gap:4px}
.td-d span{width:5px;height:5px;background:#475569;border-radius:50%;animation:bo .8s infinite}
.td-d span:nth-child(2){animation-delay:.15s}
.td-d span:nth-child(3){animation-delay:.3s}
@keyframes bo{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.aqr{display:flex;flex-wrap:wrap;gap:5px;padding:6px 12px;flex-shrink:0}
.aqb{padding:5px 10px;background:transparent;border:1px solid #00d4ff;border-radius:16px;color:#00d4ff;font-size:11px;cursor:pointer;font-family:system-ui,sans-serif;white-space:nowrap}
.aqb:hover{background:#00d4ff;color:#000;font-weight:600}
.ai-area{padding:10px 12px;border-top:1px solid #1e2a3a;display:flex;gap:7px;align-items:center;flex-shrink:0;background:#0d1117}
.ai-area input{flex:1;background:#131820;border:1px solid #1e2a3a;border-radius:10px;padding:8px 11px;color:#e2e8f0;font-size:12px;font-family:system-ui,sans-serif;outline:none}
.ai-area input:focus{border-color:#00d4ff}
.ai-area button{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,#00d4ff,#7c3aed);border:none;color:#fff;cursor:pointer;font-size:16px;flex-shrink:0}
.ai-area button:disabled{opacity:.4;cursor:not-allowed}
@media(max-width:480px){#aida-box{width:calc(100vw - 32px);right:16px;bottom:90px;height:65vh}}
</style>

<div id="aida-fab">
  <button id="aida-btn" onclick="aidaToggle()">&#x1F916;</button>
</div>

<div id="aida-box">
  <div class="ah">
    <div class="ah-av">&#x1F916;</div>
    <div><h3>Aida &mdash; Agent PST</h3><p>Pure Smart Telecom &bull; En ligne</p></div>
    <button class="ah-cl" onclick="aidaToggle()">&#x00D7;</button>
  </div>
  <div class="am" id="am"></div>
  <div class="aqr" id="aqr"></div>
  <div class="ai-area">
    <input type="text" id="ai-inp" placeholder="Ecrivez votre message...">
    <button id="ai-snd" onclick="aidaSend()">&#x27A4;</button>
  </div>
</div>

<script>
var AC=[], AO=false, AI=false;
var APIURL='https://pst-telecom-production.up.railway.app';
var SYS='Tu es Aida, assistante de PST Pure Smart Telecom. Tu parles en francais. PST propose: FORFAITS APPELS: Starter 200min/2990F, Smart 300min/5990F, Business Illimite/15990F. SMS MARKETING: 100SMS/1500F, 1000SMS/10000F, 5000SMS/40000F, 10000SMS/75000F. SMS VERIFICATION: 1000F=5 points. RECHARGE: Orange,Free,Expresso. SECURCAM: surveillance cameras 24h. Paiement Wave. Reponds en max 4 lignes courtes.';

document.getElementById('ai-inp').addEventListener('keydown',function(e){if(e.key==='Enter')aidaSend();});

function aidaToggle(){
  AO=!AO;
  var box=document.getElementById('aida-box');
  var btn=document.getElementById('aida-btn');
  if(AO){
    box.classList.add('open');
    btn.innerHTML='&#x00D7;';
    btn.style.fontSize='24px';
    if(!AI){AI=true;aidaWelcome();}
    setTimeout(function(){document.getElementById('ai-inp').focus();},300);
  } else {
    box.classList.remove('open');
    btn.innerHTML='&#x1F916;';
    btn.style.fontSize='28px';
  }
}

function aidaWelcome(){
  aidaMsg('a','Bonjour ! Je suis Aida, votre assistante PST.<br>Je peux vous aider pour les forfaits appels, SMS marketing, recharge ou surveillance camera.<br><br>Comment puis-je vous aider ?');
  aidaQR(['Forfaits appels','SMS Marketing','Recharge','SecurCam']);
}

function aidaMsg(who,txt){
  var am=document.getElementById('am');
  var d=document.createElement('div');
  d.className='mr '+who;
  var t=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  var av=who==='a'?'&#x1F916;':'&#x1F464;';
  d.innerHTML='<div class="mv">'+av+'</div><div><div class="mb">'+txt+'</div><div class="mt">'+t+'</div></div>';
  am.appendChild(d);
  am.scrollTop=am.scrollHeight;
}

function aidaTypingOn(){
  var am=document.getElementById('am');
  var d=document.createElement('div');
  d.className='td';d.id='atyp';
  d.innerHTML='<div class="mv">&#x1F916;</div><div class="td-d"><span></span><span></span><span></span></div>';
  am.appendChild(d);am.scrollTop=am.scrollHeight;
}
function aidaTypingOff(){var t=document.getElementById('atyp');if(t)t.remove();}

function aidaQR(opts){
  var qr=document.getElementById('aqr');
  qr.innerHTML='';
  opts.forEach(function(o){
    var b=document.createElement('button');
    b.className='aqb';b.textContent=o;
    b.onclick=function(){aidaQuick(o);};
    qr.appendChild(b);
  });
}

function aidaQuick(txt){
  document.getElementById('aqr').innerHTML='';
  aidaMsg('u',txt);
  aidaProcess(txt);
}

function aidaSend(){
  var inp=document.getElementById('ai-inp');
  var txt=inp.value.trim();
  if(!txt)return;
  inp.value='';
  document.getElementById('aqr').innerHTML='';
  aidaMsg('u',txt);
  aidaProcess(txt);
}

function aidaProcess(txt){
  document.getElementById('ai-snd').disabled=true;
  AC.push({role:'user',content:txt});
  aidaTypingOn();
  fetch(APIURL+'/api/agent/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({system:SYS,messages:AC})
  }).then(function(r){return r.json();}).then(function(data){
    var reply='Je rencontre une difficulte. Appelez le +221 77 152 09 59.';
    if(data&&data.content&&data.content[0])reply=data.content[0].text;
    AC.push({role:'assistant',content:reply});
    aidaTypingOff();
    aidaMsg('a',reply.replace(/\n/g,'<br>'));
    var low=reply.toLowerCase();
    if(low.indexOf('forfait')>=0||low.indexOf('starter')>=0){
      aidaQR(['Starter 2990F','Smart 5990F','Business 15990F']);
    }else if(low.indexOf('sms')>=0){
      aidaQR(['SMS Marketing','SMS Verification','Retour']);
    }else if(low.indexOf('recharge')>=0){
      aidaQR(['Orange','Free','Expresso','Retour']);
    }else{
      aidaQR(['Forfaits appels','SMS Marketing','Recharge','SecurCam']);
    }
    document.getElementById('ai-snd').disabled=false;
  }).catch(function(){
    aidaTypingOff();
    aidaMsg('a','Difficulte technique. Appelez le +221 77 152 09 59.');
    document.getElementById('ai-snd').disabled=false;
  });
}
</script>
<!-- FIN AIDA CHAT PST -->
