<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ZAMA — Transfert international</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#070D1A;
  --s1:#0D1525;
  --s2:#111D30;
  --s3:#1A2640;
  --s4:#243050;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.12);
  --gold:#F5B014;
  --gold-d:#D49A10;
  --gold-l:rgba(245,176,20,0.10);
  --gold-m:rgba(245,176,20,0.20);
  --green:#22C55E;
  --green-l:rgba(34,197,94,0.10);
  --red:#EF4444;
  --red-l:rgba(239,68,68,0.10);
  --blue:#3B82F6;
  --blue-l:rgba(59,130,246,0.10);
  --amber:#F59E0B;
  --amber-l:rgba(245,158,11,0.10);
  --text:#E2E8F0;
  --text2:#94A3B8;
  --text3:#475569;
  --font:'Inter',sans-serif;
  --r:16px;--rsm:10px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);font-weight:400;}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative;overflow:hidden;background:var(--bg);}

/* ══ SCREENS ══ */
.scr{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--bg);pointer-events:none;opacity:0;z-index:1;}
.scr.on{pointer-events:all;opacity:1;z-index:2;}
.sb{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:72px;}
.sb::-webkit-scrollbar{display:none;}

/* ══ HEADER ══ */
.hdr{flex-shrink:0;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--s1);border-bottom:1px solid var(--border);z-index:10;}
.hbk{display:flex;align-items:center;gap:6px;background:var(--s3);border:none;color:var(--text2);padding:7px 14px 7px 10px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font);transition:background .15s;}
.hbk:active{background:var(--s4);}
.hbk svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;}
.htitle{font-size:16px;font-weight:700;color:var(--text);}
.hact{font-size:13px;font-weight:600;color:var(--gold);cursor:pointer;}

/* ══ BOTTOM NAV ══ */
.bnav{position:absolute;bottom:0;left:0;right:0;height:64px;background:var(--s1);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);z-index:50;}
.bn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:10px;font-weight:600;font-family:var(--font);letter-spacing:.3px;padding:8px 4px;transition:color .15s;}
.bn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;transition:all .15s;}
.bn.on{color:var(--gold);}
.bn.on svg{stroke:var(--gold);}

/* ══ CARDS ══ */
.card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:20px;}
.card-sm{background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);padding:14px;}

/* ══ HOME HERO ══ */
.home-hero{background:linear-gradient(160deg,#080F1F 0%,#0D1830 60%,#111F3A 100%);padding:22px 20px 24px;flex-shrink:0;}
.hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.logo-row{display:flex;align-items:center;gap:10px;}
.logo-mark{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#F5B014,#FCD34D);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(245,176,20,.3);cursor:pointer;flex-shrink:0;}
.logo-mark svg{width:26px;height:26px;}
.logo-text .lname{font-size:20px;font-weight:800;color:#fff;letter-spacing:2px;line-height:1;}
.logo-text .lsub{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.hero-actions{display:flex;align-items:center;gap:10px;}
.hero-icon-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.hero-icon-btn svg{width:18px;height:18px;stroke:rgba(255,255,255,.7);fill:none;stroke-width:2;}
.hero-greeting{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px;}
.hero-sub{font-size:13px;color:rgba(255,255,255,.45);}
.rate-pill{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:7px 14px;margin-top:14px;font-size:12px;color:rgba(255,255,255,.65);font-weight:500;}
.rdot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ══ QUICK ACTIONS ══ */
.qa-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:18px 20px 0;}
.qa{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all .15s;}
.qa:active{transform:scale(.96);background:var(--s3);}
.qa-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qa-ico svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;}
.qa-lbl{font-size:11px;font-weight:600;color:var(--text2);}

/* ══ SECTION LABEL ══ */
.slbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;padding:0 20px;margin:20px 0 10px;display:flex;justify-content:space-between;align-items:center;}
.slbl-act{font-size:12px;font-weight:600;color:var(--gold);cursor:pointer;text-transform:none;letter-spacing:0;}

/* ══ RATE STRIP ══ */
.rate-strip{display:flex;gap:10px;padding:0 20px;overflow-x:auto;scrollbar-width:none;}
.rate-strip::-webkit-scrollbar{display:none;}
.rc{flex-shrink:0;background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;min-width:100px;}
.rc-flag{font-size:18px;display:block;margin-bottom:4px;}
.rc-code{font-size:11px;color:var(--text3);font-weight:600;}
.rc-val{font-size:15px;font-weight:700;color:var(--gold);margin-top:2px;}

/* ══ BENEF ITEMS ══ */
.bi{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);}
.bi-av{width:40px;height:40px;border-radius:50%;background:var(--gold-l);border:1px solid var(--gold-m);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--gold);flex-shrink:0;}
.bi-info{flex:1;min-width:0;}
.bi-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bi-meta{font-size:12px;color:var(--text3);margin-top:2px;}
.bi-btn{background:var(--gold-l);border:1px solid var(--gold-m);color:var(--gold);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:var(--font);}

/* ══ TRUST BANNER ══ */
.trust{margin:20px 20px 0;background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.trust-ico{width:36px;height:36px;border-radius:10px;background:var(--green-l);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.trust-ico svg{width:18px;height:18px;stroke:var(--green);fill:none;stroke-width:2;}
.trust-txt{font-size:12px;color:var(--text3);line-height:1.6;}
.trust-txt strong{color:var(--text2);}

/* ══ HIST ITEMS ══ */
.hi{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.hi:active{background:var(--s2);}
.hi-ico{width:44px;height:44px;border-radius:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.hi-ico svg{width:20px;height:20px;fill:none;stroke-width:2;}
.hi-info{flex:1;min-width:0;}
.hi-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hi-dest{font-size:12px;color:var(--text3);margin-top:1px;}
.hi-meta{font-size:11px;color:var(--text3);margin-top:2px;}
.hi-right{text-align:right;flex-shrink:0;}
.hi-amt{font-size:14px;font-weight:700;color:var(--gold);}
.hi-fcfa{font-size:12px;color:var(--green);font-weight:600;}
.hi-st{font-size:11px;font-weight:600;margin-top:4px;padding:2px 8px;border-radius:100px;display:inline-block;}
.st-ok{background:var(--green-l);color:var(--green);}
.st-wait{background:var(--amber-l);color:var(--amber);}
.st-fail{background:var(--red-l);color:var(--red);}

/* ══ SEND ══ */
.send-hero{background:linear-gradient(160deg,#080F1F,#0D1830);padding:20px;}
.amt-lbl{font-size:11px;font-weight:600;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.amt-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:14px;}
.amt-flag{font-size:28px;flex-shrink:0;padding-bottom:6px;}
.amt-inp{flex:1;background:transparent;border:none;outline:none;font-size:42px;font-weight:700;color:#fff;font-family:var(--font);min-width:0;}
.amt-curr{font-size:16px;font-weight:600;color:rgba(255,255,255,.35);padding-bottom:8px;flex-shrink:0;}
.convert-box{display:flex;align-items:center;gap:8px;padding:11px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;}
.convert-box svg{width:16px;height:16px;stroke:var(--gold);fill:none;flex-shrink:0;}
.conv-fcfa{font-size:16px;font-weight:700;color:var(--gold);}
.conv-rate{font-size:11px;color:rgba(255,255,255,.35);margin-left:auto;}

.curr-row{display:flex;gap:8px;padding:14px 20px;overflow-x:auto;scrollbar-width:none;}
.curr-row::-webkit-scrollbar{display:none;}
.cpill{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:8px 14px;border:1.5px solid var(--border);background:var(--s2);border-radius:100px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);transition:all .15s;}
.cpill span{font-size:16px;}
.cpill.on{border-color:var(--gold);background:var(--gold-l);color:var(--gold);}

/* ══ FEE BOX ══ */
.fee-box{margin:0 20px 14px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.fr{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px;}
.fr:last-child{border-bottom:none;}
.fr .fl{color:var(--text2);}
.fr.ftot{background:var(--gold-l);border:none;}
.fr.ftot .fv{color:var(--gold);font-weight:700;font-size:16px;}

/* ══ MM SELECTOR ══ */
.mm-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px 14px;}
.mm{padding:14px;border:1.5px solid var(--border);background:var(--s2);border-radius:var(--r);cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .15s;}
.mm:active{transform:scale(.97);}
.mm.on{border-color:var(--green);background:var(--green-l);}
.mm-logo{width:36px;height:36px;border-radius:10px;object-fit:contain;background:#fff;padding:4px;flex-shrink:0;}
.mm-nm{font-size:13px;font-weight:700;color:var(--text);}
.mm-sub{font-size:10px;color:var(--text3);}

/* ══ FORM ══ */
.fg{padding:0 20px;margin-bottom:12px;}
.fg label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px;}
.finp{width:100%;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--rsm);padding:13px 16px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .15s;-webkit-appearance:none;}
.finp:focus{border-color:var(--gold);}
.finp::placeholder{color:var(--text3);}
.finp option{background:var(--s2);}
.fi2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ══ RECEIPT ══ */
.rcpt{margin:0 20px 14px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.rr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;}
.rr:last-child{border-bottom:none;}
.rr .rl{color:var(--text2);}
.rr.rtot{background:var(--gold-l);}
.rr.rtot .rv{color:var(--gold);font-weight:700;font-size:16px;}

/* ══ PAYMENT ══ */
.pay-card{margin:20px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.pay-top{background:linear-gradient(135deg,#D4900F,#F5B014,#FCD34D);padding:22px 20px;text-align:center;}
.pay-lbl{font-size:11px;font-weight:700;color:rgba(0,0,0,.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.pay-amt{font-size:38px;font-weight:800;color:#000;line-height:1;}
.pay-sub{font-size:12px;color:rgba(0,0,0,.45);margin-top:4px;}
.pay-body{padding:20px;}
.cpx-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.cpx{display:flex;align-items:center;gap:5px;padding:7px 11px;border:1.5px solid var(--border);background:var(--s3);border-radius:20px;cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);transition:all .15s;}
.cpx svg{flex-shrink:0;border-radius:50%;}
.cpx:active{transform:scale(.95);}
.cpx.on{border-color:var(--gold);background:var(--gold-l);color:var(--gold);}
.cpx img{width:16px;height:16px;border-radius:50%;object-fit:contain;}
.pos-btn{width:100%;padding:15px;background:#000;color:#fff;border:none;border-radius:var(--rsm);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font);margin-bottom:14px;transition:opacity .15s;}
.pos-btn:active{opacity:.8;}
.pos-btn svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;}
.addr-box{background:var(--bg);border:1px dashed var(--border2);border-radius:var(--rsm);padding:12px;font-family:monospace;font-size:12px;color:var(--gold);word-break:break-all;margin-bottom:10px;line-height:1.6;}
.copy-btn{width:100%;padding:11px;background:var(--s3);border:1px solid var(--border);color:var(--text);border-radius:var(--rsm);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:6px;}
.copy-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}
.pay-timer{text-align:center;padding:9px 14px;background:var(--red-l);border:1px solid rgba(239,68,68,.15);border-radius:var(--rsm);font-size:12px;font-weight:600;color:var(--red);margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:6px;}
.pay-timer svg{width:14px;height:14px;stroke:var(--red);fill:none;stroke-width:2;}
.pay-info{background:var(--s3);border-radius:var(--rsm);padding:2px 14px;}
.pir{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
.pir:last-child{border-bottom:none;}
.pir .pl{color:var(--text2);}

/* ══ TRACKING ══ */
.track-card{margin:20px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.track-top{background:linear-gradient(160deg,#080F1F,#111D30);padding:28px 20px;text-align:center;}
.track-ico{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.track-ico svg{width:32px;height:32px;fill:none;stroke-width:2;}
.track-title{font-size:18px;font-weight:700;color:#fff;}
.track-ref{font-size:11px;color:var(--text3);margin-top:6px;font-family:monospace;}
.ts-list{padding:20px;}
.ts{display:flex;gap:14px;padding-bottom:24px;position:relative;}
.ts:last-child{padding-bottom:0;}
.ts::before{content:'';position:absolute;left:15px;top:30px;bottom:0;width:2px;background:var(--border);}
.ts:last-child::before{display:none;}
.ts-dot{width:30px;height:30px;border-radius:50%;flex-shrink:0;background:var(--s3);border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;position:relative;z-index:1;transition:all .4s;}
.ts-dot svg{width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:2;}
.ts.done .ts-dot{background:var(--green);border-color:var(--green);}
.ts.done .ts-dot svg{stroke:#fff;}
.ts.active .ts-dot{background:var(--gold);border-color:var(--gold);animation:glow 1.5s infinite;}
.ts.active .ts-dot svg{stroke:#000;}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(245,176,20,.4)}50%{box-shadow:0 0 0 8px rgba(245,176,20,0)}}
.ts-body{padding-top:4px;}
.ts-lbl{font-size:14px;font-weight:600;color:var(--text);}
.ts-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.ts.active .ts-lbl{color:var(--gold);}
.ts.pending .ts-lbl,.ts.pending .ts-dot svg{color:var(--text3);stroke:var(--text3);}

/* ══ ACCOUNT ══ */
.acct-hero{background:linear-gradient(160deg,#080F1F,#0D1830);padding:28px 20px;}
.acct-av{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#FCD34D);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#000;margin-bottom:12px;}
.acct-name{font-size:19px;font-weight:700;}
.acct-phone{font-size:13px;color:var(--text3);margin-top:2px;}
.kyc-tag{display:inline-flex;align-items:center;gap:5px;margin-top:10px;padding:5px 12px;border-radius:100px;font-size:11px;font-weight:600;}
.kyc-no{background:var(--red-l);border:1px solid rgba(239,68,68,.2);color:var(--red);}
.kyc-yes{background:var(--green-l);border:1px solid rgba(34,197,94,.2);color:var(--green);}
.kyc-tag svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;}
.limit-bar{margin:0 20px 14px;background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);padding:14px;}
.lb-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px;}
.lb-l{color:var(--text2);}
.lb-r{font-weight:600;}
.lb-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.lb-fill{height:100%;background:linear-gradient(90deg,var(--gold),#FCD34D);border-radius:3px;}
.lb-sub{font-size:11px;color:var(--text3);margin-top:6px;}
.ai{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.ai:active{background:var(--s2);}
.ai-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ai-ico svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;}
.ai-lbl{font-size:14px;font-weight:500;flex:1;color:var(--text);}
.ai-arr svg{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;}
.ai.danger .ai-lbl{color:var(--red);}

/* ══ LEGAL ══ */
.legal-hero{background:linear-gradient(160deg,#080F1F,#0D1830);padding:28px 20px;}
.lh-ico{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.lh-ico svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2;}
.lh-title{font-size:20px;font-weight:700;}
.lh-date{font-size:12px;color:var(--text3);margin-top:4px;}
.legal-body{padding:20px;}
.legal-body h3{font-size:15px;font-weight:700;margin:20px 0 8px;padding-top:16px;border-top:1px solid var(--border);color:var(--text);}
.legal-body h3:first-child{border-top:none;padding-top:0;margin-top:0;}
.legal-body p{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:10px;}
.legal-body ul{padding-left:18px;margin-bottom:10px;}
.legal-body li{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:4px;}

/* ══ ADMIN ══ */
.adm-hero{background:linear-gradient(160deg,#080F1F,#0D1830);padding:20px;display:flex;align-items:center;justify-content:space-between;}
.adm-user-row{display:flex;align-items:center;gap:12px;}
.adm-av{width:44px;height:44px;border-radius:50%;background:var(--gold-l);border:2px solid var(--gold-m);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--gold);}
.adm-nm{font-size:15px;font-weight:700;}
.adm-role{font-size:11px;color:var(--text3);margin-top:2px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 20px;}
.stat-card{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:16px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card.blue::before{background:var(--blue);}
.stat-card.gold::before{background:var(--gold);}
.stat-card.green::before{background:var(--green);}
.stat-card.amber::before{background:var(--amber);}
.stat-lbl{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.stat-val{font-size:28px;font-weight:700;line-height:1;}
.stat-card.blue .stat-val{color:var(--blue);}
.stat-card.gold .stat-val{color:var(--gold);}
.stat-card.green .stat-val{color:var(--green);}
.stat-card.amber .stat-val{color:var(--amber);}
.stat-sub{font-size:11px;color:var(--text3);margin-top:6px;}
.order-card{padding:14px 20px;border-bottom:1px solid var(--border);}
.oc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.oc-name{font-size:14px;font-weight:600;}
.oc-amt{font-size:14px;font-weight:700;color:var(--gold);}
.oc-mid{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:6px;}
.oc-fcfa{color:var(--green);font-weight:600;}
.oc-bot{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);}

/* ══ CONTACT ══ */
.cm{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.cm:active{background:var(--s2);}
.cm-ico{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cm-ico svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;}
.cm-title{font-size:14px;font-weight:600;}
.cm-val{font-size:12px;color:var(--text3);margin-top:2px;}
.cm-arr svg{width:16px;height:16px;stroke:var(--text3);fill:none;stroke-width:2;}

/* ══ QR ══ */
.qr-hero{background:linear-gradient(160deg,#080F1F,#0D1830);padding:28px 20px;text-align:center;}
.qr-wrap{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:20px;display:inline-block;margin:14px 0;}
.qr-name{font-size:17px;font-weight:700;margin-top:4px;}
.qr-phone{font-size:13px;color:var(--gold);margin-top:2px;}
.qr-acts{display:flex;gap:10px;padding:0 20px;margin-bottom:14px;}
.qra{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:background .1s;}
.qra:active{background:var(--s3);}
.qra svg{width:20px;height:20px;stroke:var(--gold);fill:none;stroke-width:2;}
.qra-lbl{font-size:11px;font-weight:600;color:var(--text2);}

/* ══ KYC ══ */
.pz{border:2px dashed var(--border2);border-radius:var(--r);padding:24px;text-align:center;cursor:pointer;background:var(--s2);transition:all .15s;margin-bottom:12px;position:relative;overflow:hidden;}
.pz.has{border-color:var(--green);border-style:solid;}
.pz-img{width:100%;max-height:150px;object-fit:cover;border-radius:8px;display:none;}
.pz.has .pz-img{display:block;}
.pz.has .pz-ph{display:none;}
.pz-ph svg{width:32px;height:32px;stroke:var(--text3);fill:none;stroke-width:1.5;display:block;margin:0 auto 8px;}
.pz-lbl{font-size:14px;font-weight:600;color:var(--text2);}
.pz-sub{font-size:12px;color:var(--text3);margin-top:4px;}
.photo-input{position:absolute;inset:0;opacity:0;cursor:pointer;}

/* ══ ABOUT ══ */
.feat{display:flex;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border);}
.feat-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.feat-ico svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;}
.feat-title{font-size:14px;font-weight:600;margin-bottom:2px;}
.feat-sub{font-size:12px;color:var(--text3);line-height:1.5;}
.badge-row{display:flex;flex-wrap:wrap;gap:8px;padding:14px 20px;}
.badge{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--s2);border:1px solid var(--border);border-radius:100px;font-size:12px;font-weight:600;color:var(--text2);}
.badge svg{width:12px;height:12px;stroke:var(--green);fill:none;stroke-width:2.5;}

/* ══ LOGIN ══ */
.login-top{background:linear-gradient(160deg,#080F1F,#0D1830);padding:48px 24px 32px;text-align:center;}
.login-logo{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#F5B014,#FCD34D);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 32px rgba(245,176,20,.3);}
.login-logo svg{width:40px;height:40px;}
.login-title{font-size:28px;font-weight:800;letter-spacing:3px;margin-bottom:4px;}
.login-sub{font-size:13px;color:rgba(255,255,255,.4);}
.tab-row{display:flex;background:var(--s2);border-radius:10px;padding:3px;margin:20px 20px 0;}
.tab{flex:1;padding:10px;border:none;background:transparent;border-radius:8px;font-size:14px;font-weight:600;color:var(--text3);cursor:pointer;font-family:var(--font);transition:all .15s;}
.tab.on{background:var(--s3);color:var(--text);}
.ph-wrap{position:relative;margin-bottom:12px;}
.ph-flag{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;}
.ph-inp{width:100%;background:var(--s2);border:1.5px solid var(--border);border-radius:var(--rsm);padding:13px 16px 13px 44px;color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .15s;-webkit-appearance:none;}
.ph-inp:focus{border-color:var(--gold);}
.ph-inp::placeholder{color:var(--text3);}
.pwd-wrap{position:relative;margin-bottom:12px;}
.pwd-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:var(--text3);}
.pwd-eye svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;}

/* ══ BUTTONS ══ */
.btn-p{width:calc(100% - 40px);margin:0 20px;padding:15px;background:linear-gradient(135deg,var(--gold),#FCD34D);color:#000;border:none;border-radius:var(--rsm);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font);transition:opacity .15s;}
.btn-p:active{opacity:.85;}
.btn-p:disabled{opacity:.4;cursor:not-allowed;}
.btn-p svg{width:16px;height:16px;stroke:#000;fill:none;stroke-width:2.5;}
.btn-s{background:var(--s2);border:1.5px solid var(--border);color:var(--text2);border-radius:var(--rsm);padding:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);}
.btn-2{display:grid;grid-template-columns:1fr 2fr;gap:10px;padding:0 20px;}
.btn-2 .btn-p{width:100%;margin:0;}
.btn-foot{padding:12px 0 16px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0;}
.spacer{height:20px;}
.divider{height:1px;background:var(--border);}

/* ══ PIN ══ */
.pin-scr{position:fixed;inset:0;background:#040810;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;max-width:430px;margin:0 auto;}
.pin-logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#F5B014,#FCD34D);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(245,176,20,.35);margin-bottom:16px;}
.pin-logo svg{width:36px;height:36px;}
.pin-app{font-size:24px;font-weight:800;color:#fff;letter-spacing:2px;margin-bottom:6px;}
.pin-sub{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:36px;text-align:center;min-height:18px;}
.pin-dots{display:flex;gap:14px;margin-bottom:40px;}
.pd{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.2);transition:all .2s;}
.pd.on{background:var(--gold);border-color:var(--gold);}
.pd.err{background:var(--red);border-color:var(--red);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:270px;}
.pk{height:68px;background:rgba(255,255,255,.07);border:none;border-radius:14px;font-size:22px;font-weight:600;color:#fff;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all .15s;font-family:var(--font);}
.pk:active{background:rgba(255,255,255,.15);transform:scale(.95);}
.pk.empty{background:transparent;cursor:default;}
.pk-sub{font-size:8px;color:rgba(255,255,255,.3);letter-spacing:1px;}
.pk svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;}
.pin-link{margin-top:24px;font-size:13px;color:var(--gold);cursor:pointer;}

/* ══ OTP MODAL ══ */
.otp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;display:none;align-items:flex-end;justify-content:center;max-width:430px;margin:0 auto;}
.otp-overlay.open{display:flex;}
.otp-sheet{background:var(--s1);border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;border-top:1px solid var(--border);}
.otp-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
.otp-inputs{display:flex;gap:10px;justify-content:center;margin:20px 0;}
.otp-inp{width:52px;height:56px;border:2px solid var(--border);border-radius:var(--rsm);font-size:24px;font-weight:700;text-align:center;font-family:var(--font);color:var(--text);background:var(--s2);outline:none;transition:border-color .15s;}
.otp-inp:focus{border-color:var(--gold);}

/* ══ ADMIN MODAL ══ */
.adm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999;display:none;align-items:flex-end;justify-content:center;max-width:430px;margin:0 auto;}
.adm-overlay.open{display:flex;}
.adm-sheet{background:var(--s1);border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;border-top:1px solid var(--border);}

/* ══ WARN BOX ══ */
.wbox{margin:0 20px 14px;background:var(--amber-l);border:1px solid rgba(245,158,11,.2);border-radius:var(--rsm);padding:12px 14px;font-size:13px;color:var(--amber);display:flex;gap:8px;align-items:flex-start;line-height:1.5;}
.wbox svg{width:16px;height:16px;stroke:var(--amber);fill:none;stroke-width:2;flex-shrink:0;margin-top:1px;}

/* ══ SEC BADGE ══ */
.sec-badge{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:var(--text3);padding:10px 20px;}
.sec-badge svg{width:12px;height:12px;stroke:var(--text3);fill:none;stroke-width:2;}
#izi-iframe-wrap{position:relative;border-radius:var(--r);overflow:hidden;border:1px solid var(--border);}
#izi-iframe{width:100%;min-height:70vh;height:calc(100vh - 320px);border:none;display:block;background:#fff;}
@media(min-width:430px){#izi-iframe{height:calc(100vh - 280px);min-height:500px;}}
.logo-upload-btn{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--s3);border:1px solid var(--border2);border-radius:20px;cursor:pointer;font-size:10px;font-weight:600;color:var(--text3);transition:all .15s;}
.logo-upload-btn:active{background:var(--s4);}
.logo-upload-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;}
.logo-img-preview{width:36px;height:36px;border-radius:10px;object-fit:cover;}

/* ══ EMPTY STATE ══ */
.empty-st{padding:48px 20px;text-align:center;}
.empty-st svg{width:48px;height:48px;stroke:var(--text3);fill:none;stroke-width:1.5;display:block;margin:0 auto 12px;}
.empty-st .et{font-size:15px;font-weight:600;color:var(--text2);}
.empty-st .es{font-size:13px;color:var(--text3);margin-top:4px;line-height:1.6;}

/* ══ SPINNER ══ */
.spin{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;}
.spin-w{border-color:rgba(255,255,255,.2);border-top-color:#fff;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══ RATES SCREEN ══ */
.rate-item{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.ri-l{display:flex;align-items:center;gap:12px;}
.ri-flag{font-size:28px;}
.ri-name{font-size:14px;font-weight:600;}
.ri-code{font-size:11px;color:var(--text3);margin-top:2px;}
.ri-val{font-size:17px;font-weight:700;color:var(--gold);}
.ri-chg{font-size:11px;color:var(--green);text-align:right;margin-top:2px;}

/* ══ TOAST ══ */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-110px);background:var(--s2);border:1px solid var(--border);border-radius:100px;padding:12px 20px;font-size:13px;font-weight:600;z-index:99999;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5);pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:rgba(34,197,94,.3);color:var(--green);}
.toast.err{border-color:rgba(239,68,68,.3);color:var(--red);}
.toast.info{border-color:rgba(245,176,20,.3);color:var(--gold);}

.cpx-grid2{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.cpx-new2{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;border:1.5px solid var(--border);background:var(--s2);border-radius:12px;cursor:pointer;transition:all .15s;text-align:center;font-size:10px;font-weight:600;color:var(--text2);user-select:none;}
.cpx-new2:active{transform:scale(.96);}
.cpx-new2.on{border-color:var(--gold);background:var(--gold-l);color:var(--gold);}
.cpx-logo{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

.cpx-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.cx3{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 4px;border:1.5px solid var(--border);background:var(--s2);border-radius:12px;cursor:pointer;transition:all .12s;text-align:center;font-size:10px;font-weight:600;color:var(--text2);user-select:none;-webkit-tap-highlight-color:transparent;}
.cx3:active{transform:scale(.95);}
.cx3.on{border-color:var(--gold);background:var(--gold-l);color:var(--gold);}

.pay-tab-btn{flex:1;padding:11px;border:none;background:transparent;color:var(--text3);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);border-bottom:2px solid transparent;transition:all .15s;}
.pay-tab-btn.on{color:var(--gold);border-bottom:2px solid var(--gold);}

/* ── TIMELINE PREMIUM ── */
.tl-wrap{padding:20px;}
.tl-step{display:flex;gap:14px;padding-bottom:0;position:relative;}
.tl-step+.tl-step{margin-top:0;}
.tl-line{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.tl-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1;transition:all .4s;}
.tl-dot svg{width:16px;height:16px;fill:none;stroke-width:2.5;}
.tl-connector{width:2px;flex:1;min-height:20px;transition:background .4s;}
.tl-body{padding:8px 0 24px;flex:1;}
.tl-lbl{font-size:14px;font-weight:700;transition:color .3s;}
.tl-sub{font-size:12px;color:var(--text3);margin-top:3px;line-height:1.5;}
.tl-time{font-size:10px;color:var(--text3);margin-top:4px;font-family:monospace;}
.tl-tag{display:inline-flex;align-items:center;gap:4px;margin-top:6px;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;}

/* États */
.tl-step.done .tl-dot{background:var(--green);border:2px solid var(--green);}
.tl-step.done .tl-dot svg{stroke:#fff;}
.tl-step.done .tl-connector{background:var(--green);}
.tl-step.done .tl-lbl{color:var(--green);}
.tl-step.done .tl-tag{background:var(--green-l);color:var(--green);}

.tl-step.active .tl-dot{background:var(--gold);border:2px solid var(--gold);animation:tl-pulse 1.5s infinite;}
.tl-step.active .tl-dot svg{stroke:#000;}
.tl-step.active .tl-connector{background:var(--border);}
.tl-step.active .tl-lbl{color:var(--gold);}
.tl-step.active .tl-tag{background:var(--gold-l);color:var(--gold);}

.tl-step.pending .tl-dot{background:var(--s3);border:2px solid var(--border2);}
.tl-step.pending .tl-dot svg{stroke:var(--text3);}
.tl-step.pending .tl-connector{background:var(--border);}
.tl-step.pending .tl-lbl{color:var(--text3);}

@keyframes tl-pulse{0%,100%{box-shadow:0 0 0 0 rgba(245,176,20,.4)}50%{box-shadow:0 0 0 10px rgba(245,176,20,0)}}

/* Bloc info transaction */
.tx-info-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--rsm);padding:14px;margin-bottom:14px;}
.tx-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.tx-row:last-child{border-bottom:none;}
.tx-lbl{color:var(--text3);}
.tx-val{font-weight:600;text-align:right;}

/* Statut badge top */
.tx-status-hero{padding:24px 20px;text-align:center;}
.tx-ico{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.tx-ico svg{width:32px;height:32px;fill:none;stroke-width:2;}
.tx-title{font-size:20px;font-weight:700;}
.tx-ref{font-size:11px;color:var(--text3);margin-top:4px;font-family:monospace;}
.tx-eta{font-size:13px;color:var(--text2);margin-top:6px;}

/* ══ ZAMA v2 — Dashboard & UX Améliorations ══ */
.user-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:14px 20px 0;}
.ust{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:12px 10px;text-align:center;transition:background .1s;}
.ust:active{background:var(--s3);}
.ust-val{font-size:18px;font-weight:800;color:var(--gold);line-height:1;}
.ust-lbl{font-size:9px;color:var(--text3);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.promo-banner{margin:14px 20px 0;background:linear-gradient(135deg,#0A1020,#0D1525);border:1px solid rgba(245,176,20,.12);border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:10px;overflow:hidden;position:relative;}
.promo-banner::before{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(245,176,20,.05),transparent);animation:shimmer 3s infinite;}
@keyframes shimmer{to{left:200%}}
.pb-ico{font-size:18px;flex-shrink:0;}
.pb-txt{font-size:11px;color:var(--text2);line-height:1.6;}
.pb-txt strong{color:var(--gold);}
.last-tx{margin:14px 20px 0;background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:none;align-items:center;gap:12px;cursor:pointer;transition:background .1s;}
.last-tx.show{display:flex;}
.last-tx:active{background:var(--s3);}
.ltx-ico{width:38px;height:38px;border-radius:11px;background:var(--green-l);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ltx-ico svg{width:17px;height:17px;stroke:var(--green);fill:none;stroke-width:2;}
.ltx-info{flex:1;min-width:0;}
.ltx-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ltx-meta{font-size:11px;color:var(--text3);margin-top:1px;}

function updateUserStats() {
  var ords = getOrds();
  var sec = document.getElementById('user-stats-section');
  if(!ords || !ords.length) { if(sec) sec.style.display='none'; return; }
  if(sec) sec.style.display='grid';
  var paid = ords.filter(function(o){ return o.status==='paid'; });
  var totalFCFA = paid.reduce(function(s,o){ return s+(o.net_fcfa||0); },0);
  var savingsWU = Math.round(paid.reduce(function(s,o){ return s+(o.amount||0); },0)*(rates[cK]||606)*0.05);
  var s = function(id,v){ var e=document.getElementById(id); if(e)e.textContent=v; };
  s('ust-sent', totalFCFA>999?(totalFCFA/1000).toFixed(0)+'k':String(totalFCFA||'0'));
  s('ust-tx', String(ords.length));
  s('ust-save', savingsWU>999?(savingsWU/1000).toFixed(0)+'k':String(savingsWU||'0'));
}

  var ords = getOrds();

function checkAmtLimits() {
  var a=parseFloat(document.getElementById('s-amt')?document.getElementById('s-amt').value:0)||0;
  var lim=document.getElementById('amt-limit-msg');
  if(!lim) return;
  var kyc=user&&user.kyc;
  var maxD=kyc?5000:500;
  var ml=document.getElementById('amt-max-lbl'); if(ml)ml.textContent=String(maxD);
  if(a>=1&&a<=maxD){lim.innerHTML='<span class="lim-ok">Montant valide</span><span>Max '+maxD+' '+curr+'/jour</span>';}
  else if(a>maxD){lim.innerHTML='<span class="lim-err">Dépasse la limite</span><span>KYC pour 5000/j</span>';}
  else if(a>0&&a<1){lim.innerHTML='<span class="lim-err">Minimum 1 '+curr+'</span><span>Max '+maxD+'/jour</span>';}
  else{lim.innerHTML='<span></span><span>Max '+maxD+' '+curr+'/jour</span>';}

// RATES
async function fetchRates(){
  try{
    var r=await fetch("https://api.exchangerate-api.com/v4/latest/USD");
    var d=await r.json();
    if(d.rates){var x=d.rates.XOF||606;rates.usd=Math.round(x);rates.eur=Math.round(x/d.rates.EUR);rates.gbp=Math.round(x/d.rates.GBP);rates.cad=Math.round(x/d.rates.CAD);rates.chf=Math.round(x/d.rates.CHF);}
  }catch(e){}
  var s=function(id,v){var e=document.getElementById(id);if(e)e.textContent=v;};
  var f=function(v){return v.toLocaleString("fr-FR")+" FCFA";};
  s("h-rate",rates.usd.toLocaleString("fr-FR"));
  s("rs1",rates.usd.toLocaleString("fr-FR"));s("rs2",rates.eur.toLocaleString("fr-FR"));
  s("rs3",rates.gbp.toLocaleString("fr-FR"));s("rs4",rates.cad.toLocaleString("fr-FR"));
  s("rr1",f(rates.usd));s("rr2",f(rates.eur));s("rr3",f(rates.gbp));s("rr4",f(rates.cad));s("rr5",f(rates.chf));
  var rts=document.getElementById("rates-ts");
  if(rts)rts.textContent=new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
  calc();
}

function _animateTracking(){
  var steps=["tl1","tl2","tl3","tl4","tl5"];
  var now=new Date();
  var delay=0;
  steps.forEach(function(id,i){
    setTimeout(function(){
      // Marquer précédent comme done
      if(i>0){
        var prev=document.getElementById(steps[i-1]);
        if(prev){
          prev.className="tl-step done";
          var dot=prev.querySelector(".tl-dot");
          if(dot)dot.innerHTML='<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="white" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>';
          var tag=prev.querySelector(".tl-tag");
          if(tag)tag.innerHTML='<svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20,6 9,17 4,12"/></svg> Complété';
          var t=document.getElementById(steps[i-1]+"-time");
          if(t)t.textContent=new Date(now.getTime()-((steps.length-i)*45000)).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
        }
      }
      // Marquer actuel comme active
      var cur=document.getElementById(id);
      if(cur){
        cur.className="tl-step active";
        var tag=cur.querySelector(".tl-tag");
        if(tag)tag.innerHTML='<svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20,6 9,17 4,12"/></svg> En cours...';
      }
      // Dernier step = succès
      if(i===steps.length-1){
        setTimeout(function(){
          if(cur){
            cur.className="tl-step done";
            var dot=cur.querySelector(".tl-dot");
            if(dot)dot.innerHTML='<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="white" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>';
            var tag=cur.querySelector(".tl-tag");
            if(tag)tag.innerHTML='<svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20,6 9,17 4,12"/></svg> Terminé';
            var t=document.getElementById(id+"-time");
            if(t)t.textContent=new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
          }
          // Hero succès
          var ico=document.getElementById("tx-ico");
          if(ico){ico.style.background="var(--green-l)";ico.innerHTML='<svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="var(--green)" stroke-width="2"><polyline points="20,6 9,17 4,12"/></svg>';}
          var title=document.getElementById("tx-title");
          if(title)title.textContent="Transfert réussi ! 🎉";
          var eta=document.getElementById("tx-eta");
          if(eta)eta.textContent="✅ Fonds crédités avec succès";
          updateOrder(orderId,"paid");
          renderHist();
          if(checkT)clearInterval(checkT);
        },2000);
      }
    },delay);
    delay+=2000;
  });
}

function pzPrev(input,zoneId,previewId,canvasId){
  if(!input.files||!input.files[0])return;
  var reader=new FileReader();

    var img=document.getElementById(previewId);if(img)img.src=e.target.result;
    var zone=document.getElementById(zoneId);if(zone)zone.classList.add("has");
    var imgEl=new Image();imgEl.onload=function(){
      var cv=document.getElementById(canvasId);if(!cv)return;
      var maxW=800,ratio=Math.min(maxW/imgEl.width,maxW/imgEl.height,1);
      cv.width=Math.round(imgEl.width*ratio);cv.height=Math.round(imgEl.height*ratio);
      cv.getContext("2d").drawImage(imgEl,0,0,cv.width,cv.height);
      kP[zoneId.replace("pz-","")]=cv.toDataURL("image/jpeg",.7);
    };imgEl.src=e.target.result;
  };reader.readAsDataURL(input.files[0]);
}

function drawRecvQR(text) {
  var cv = document.getElementById('recv-qr'); if(!cv) return;
  var ctx = cv.getContext('2d'); var sz = 180;
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,sz,sz);
  var hash = 0;
  for(var i=0;i<text.length;i++){hash=(hash<<5)-hash+text.charCodeAt(i);hash|=0;}
  var cell = 5, cols = Math.floor(sz/cell);
  ctx.fillStyle = '#000';
  for(var r=0;r<cols;r++){for(var c=0;c<cols;c++){
    if((hash^(r*31+c*17)^(r^c))%3===0) ctx.fillRect(c*cell,r*cell,cell-1,cell-1);
  }}
  ctx.fillStyle='#fff';ctx.fillRect(75,75,30,30);
  ctx.fillStyle='#22C55E';ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.fillText('Z',90,89);
}

    var data = await res.json();
    if(data && data.length > 0) {
      el.innerHTML = data.map(function(r){
        return "<div style='display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px'>" +
          "<div><div style='font-weight:600;color:var(--green)'>+" + (r.amount||'--') + " " + (r.coin||'').toUpperCase() + "</div>" +
          "<div style='font-size:11px;color:var(--text3);margin-top:2px'>" + new Date(r.created_at).toLocaleDateString('fr-FR') + "</div></div>" +
          "<div style='font-size:11px;padding:3px 8px;border-radius:100px;background:var(--green-l);color:var(--green);font-weight:600'>Reçu</div>" +
          "</div>";
      }).join('');
    }
  } catch(e) {}
}


// ── GESTION LOGOS PERSONNALISÉS ──
function uploadLogo(input, targetId, previewId) {
  if(!input.files||!input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var imgData = e.target.result;
    var target = document.getElementById(targetId);
    var preview = document.getElementById(previewId);
    if(!target) return;
    // Remplacer le contenu par une image
    target.innerHTML = '<img src="'+imgData+'" style="width:100%;height:100%;object-fit:cover;border-radius:inherit">';
    target.style.background = 'transparent';
    target.style.padding = '0';
    if(preview) preview.innerHTML = '<img src="'+imgData+'" class="logo-img-preview">';
    // Sauvegarder en localStorage
    localStorage.setItem('zama_logo_'+targetId, imgData);
    toast('Logo mis à jour !', 'ok');
    document.getElementById('logo-upload-panel').style.display = 'none';
  };
  reader.readAsDataURL(input.files[0]);
}

function resetLogos() {
  ['logo-mark','mm-wave-logo','mm-om-logo'].forEach(function(id) {
    localStorage.removeItem('zama_logo_'+id);
  });
  toast('Logos réinitialisés — rechargez la page', 'info');
  setTimeout(function(){ location.reload(); }, 1500);
}

function loadSavedLogos() {
  var logos = {
    'logo-mark': null,
    'mm-wave-logo': null,
    'mm-om-logo': null
  };
  Object.keys(logos).forEach(function(id) {
    var saved = localStorage.getItem('zama_logo_'+id);
    if(saved) {
      var el = document.getElementById(id);
      if(el) {
        el.innerHTML = '<img src="'+saved+'" style="width:100%;height:100%;object-fit:cover;border-radius:inherit">';
        el.style.background = 'transparent';
        el.style.padding = '0';
      }
    }
  });
}

// TOAST
var _toastT;
function toast(msg,type){var t=document.getElementById("toast");t.textContent=msg;t.className="toast show"+(type?" "+type:"");clearTimeout(_toastT);_toastT=setTimeout(function(){t.classList.remove("show");},3000);}
// ══════════════════════════════════════════════
// ZAMA — JS Lien de paiement
// ══════════════════════════════════════════════

var _plMM = 'wave';
var _plData = null;
var ZAMA_BASE = 'https://pst-telecom-production.up.railway.app';

function selPLMM(mm) {
  _plMM = mm;
  var wave = document.getElementById('pl-mm-wave');
  var om = document.getElementById('pl-mm-om');
  if (mm === 'wave') {
    if(wave){wave.style.borderColor='var(--green)';wave.style.background='var(--green-l)';wave.style.color='var(--green)';}
    if(om){om.style.borderColor='var(--border)';om.style.background='var(--s2)';om.style.color='var(--text2)';}
  } else {
    if(om){om.style.borderColor='var(--amber)';om.style.background='var(--amber-l)';om.style.color='var(--amber)';}
    if(wave){wave.style.borderColor='var(--border)';wave.style.background='var(--s2)';wave.style.color='var(--text2)';}
  }
}

async function loadPaylinkScreen() {
  var loading = document.getElementById('pl-loading');
  var active = document.getElementById('pl-active');
  var create = document.getElementById('pl-create');
  if(loading) loading.style.display = 'block';
  if(active) active.style.display = 'none';
  if(create) create.style.display = 'none';

  if (!user) {
    if(loading) loading.style.display = 'none';
    if(create) create.style.display = 'block';
    // Pré-remplir avec infos user si connecté
    return;
  }

  try {
    var res = await fetch(API + '/api/zama/paylink/user/' + user.id);
    var data = await res.json();
    if(loading) loading.style.display = 'none';
    if (data && data.code) {
      _plData = data;
      showActivePL(data);
    } else {
      if(create) create.style.display = 'block';
      // Pré-remplir
      var n = document.getElementById('pl-name');
      var p = document.getElementById('pl-phone');
      if(n) n.value = (user.prenom || '') + ' ' + (user.nom || '');
      if(p) p.value = user.phone || '';
    }
  } catch(e) {
    if(loading) loading.style.display = 'none';
    if(create) create.style.display = 'block';
  }
}

function showActivePL(data) {
  var active = document.getElementById('pl-active');
  if(active) active.style.display = 'block';

  var url = ZAMA_BASE + '/zama?pay=' + data.code;
  var urlEl = document.getElementById('pl-url');
  if(urlEl) urlEl.textContent = url;

  // Stats
  var cl = document.getElementById('pl-clicks'); if(cl) cl.textContent = data.clicks || 0;
  var py = document.getElementById('pl-payments'); if(py) py.textContent = data.payments || 0;

  // Bénéficiaire
  var av = document.getElementById('pl-av'); if(av) av.textContent = (data.name||'?')[0].toUpperCase();
  var bn = document.getElementById('pl-bname'); if(bn) bn.textContent = data.name || '--';
  var bp = document.getElementById('pl-bphone'); if(bp) bp.textContent = data.phone || '--';
  var bm = document.getElementById('pl-bmm');
  if(bm) bm.innerHTML = data.mm === 'wave'
    ? '<div style="font-size:11px;font-weight:700;color:#1C8EF9;background:rgba(28,142,249,.1);padding:4px 10px;border-radius:20px">Wave 💙</div>'
    : '<div style="font-size:11px;font-weight:700;color:#FF6600;background:rgba(255,102,0,.1);padding:4px 10px;border-radius:20px">Orange Money 🟠</div>';

  // Dessiner QR
  drawPLQR(url);
}

function drawPLQR(text){
  var wrap=document.getElementById('pl-qr');
  if(!wrap) return;
  var parent=wrap.parentNode;
  var div=document.getElementById('pl-qr-div');
  if(!div){div=document.createElement('div');div.id='pl-qr-div';parent.replaceChild(div,wrap);}
  div.innerHTML='';
  div.style.cssText='display:inline-block;background:#fff;padding:8px;border-radius:10px;';
  try{new QRCode(div,{text:text,width:180,height:180,colorDark:'#070D1A',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});}catch(e){}
}

function copyPaylink() {
  if(!_plData) return;
  var url = ZAMA_BASE + '/zama?pay=' + _plData.code;
  navigator.clipboard.writeText(url).then(function(){ toast('Lien copié !', 'ok'); });
}

function sharePaylink() {
  if(!_plData) return;
  var url = ZAMA_BASE + '/zama?pay=' + _plData.code;
  var name = _plData.name || (user ? (user.prenom||'') + ' ' + (user.nom||'') : '');
  var text = 'Envoyez-moi de l\'argent via ZAMA\n' + name + '\n\nCliquez ici :\n' + url + '\n\nPaiement crypto → Wave/Orange Money 🇸🇳';
  if(navigator.share){ navigator.share({title:'Paiement ZAMA', text:text, url:url}).catch(function(){}); }
  else { navigator.clipboard.writeText(text).then(function(){ toast('Texte copié !', 'ok'); }); }
}

function shareWhatsApp() {
  if(!_plData) return;
  var url = ZAMA_BASE + '/zama?pay=' + _plData.code;
  var name = _plData.name || (user ? (user.prenom||'') + ' ' + (user.nom||'') : '');
  var msg = encodeURIComponent('Envoyez-moi de l\'argent via ZAMA ' + String.fromCharCode(127469,127480) + '\n' + name + '\n\n' + url);
  window.open('https://wa.me/?text=' + msg, '_blank');
}

async function createPaylink() {
  if(!user){ toast('Connectez-vous d\'abord', 'err'); goto('scr-login'); return; }
  var name = document.getElementById('pl-name') ? document.getElementById('pl-name').value.trim() : '';
  var phone = document.getElementById('pl-phone') ? document.getElementById('pl-phone').value.trim() : '';
  var note = document.getElementById('pl-note') ? document.getElementById('pl-note').value.trim() : '';
  if(!name || !phone){ toast('Nom et numéro requis', 'err'); return; }
  var btn = document.getElementById('pl-create-btn');
  btn.disabled = true; btn.innerHTML = '<div class="spin"></div> Création...';
  try {
    var res = await fetch(API + '/api/zama/paylink/create', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ user_id: user.id, name, phone, mm: _plMM, note })
    });
    var data = await res.json();
    if(data.success){
      _plData = data.paylink;
      document.getElementById('pl-create').style.display = 'none';
      showActivePL(data.paylink);
      toast('Lien créé !', 'ok');
    } else { toast(data.error || 'Erreur', 'err'); }
  } catch(e){ toast('Erreur réseau', 'err'); }
  btn.disabled = false; btn.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#000" stroke-width="2.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>Générer mon lien';
}

async function deletePaylink() {
  if(!_plData || !confirm('Supprimer ce lien ?')) return;
  try {
    await fetch(API + '/api/zama/paylink/' + _plData.code, {method:'DELETE'});
    _plData = null;
    document.getElementById('pl-active').style.display = 'none';
    document.getElementById('pl-create').style.display = 'block';
    toast('Lien supprimé', 'ok');
  } catch(e){ toast('Erreur', 'err'); }
}

// Détecter ?pay=CODE à l'ouverture de ZAMA
function checkPayParam() {
  var params = new URLSearchParams(window.location.search);
  var code = params.get('pay');
  if(!code) return;
  // Charger les infos du bénéficiaire et pré-remplir
  loadPayCode(code);
}

async function loadPayCode(code) {
  try {
    var res = await fetch(API + '/api/zama/paylink/' + code);
    var data = await res.json();
    if(data && data.phone){
      // Pré-remplir le formulaire d'envoi
      goto('scr-send');
      setTimeout(function(){
        // Aller directement à l'écran destinataire avec les infos pré-remplies
        var rname = document.getElementById('r-name'); if(rname) rname.value = data.name || '';
        var rphone = document.getElementById('r-phone'); if(rphone) rphone.value = data.phone || '';
        var mmEl = document.getElementById('mm-' + (data.mm === 'om' ? 'om' : 'wave'));
        if(mmEl) selMM(data.mm === 'om' ? 'om' : 'wave', mmEl);
        // Afficher un banner
        toast('Envoyer à ' + (data.name||'') + ' via ' + (data.mm==='om'?'Orange Money':'Wave'), 'info');
      }, 300);
    }
  } catch(e){}
}


// ══ HQS — QR Accueil ══
var _hqsStream=null,_hqsUrl=null,_hqsDone=false;
function hqsInit(){
  var g=document.getElementById('hqs-guest-msg');
  var u=document.getElementById('hqs-user-qr');
  if(!user){if(g)g.style.display='block';if(u)u.style.display='none';return;}
  if(g)g.style.display='none';if(u)u.style.display='block';
  var name=(user.prenom||'')+' '+(user.nom||'');
  var phone=user.phone||'';
  var n=document.getElementById('hqs-n');if(n)n.textContent=name.trim()||'--';
  var p=document.getElementById('hqs-p');if(p)p.textContent=phone;
  _hqsUrl='https://pst-telecom-production.up.railway.app/zama?pay_phone='+encodeURIComponent(phone)+'&pay_name='+encodeURIComponent(name.trim());
  if(!_hqsDone) hqsGenQR();
  hqsLoadContacts();
}
function hqsGenQR(){
  var c=document.getElementById('hqs-qr');if(!c||!_hqsUrl)return;
  function tryQR(n){
    if(typeof QRCode!=='undefined'){
      c.innerHTML='';
      try{new QRCode(c,{text:_hqsUrl,width:170,height:170,colorDark:'#070D1A',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});_hqsDone=true;}
      catch(e){c.innerHTML='<div style="padding:16px;font-size:11px;color:var(--text3)">QR: '+e.message+'</div>';}
    } else if(n>0){setTimeout(function(){tryQR(n-1);},500);}
    else{c.innerHTML='<div style="padding:16px;font-size:11px;color:var(--text3)">QRCode.js non chargé</div>';}
  }
  tryQR(20);
}
function hqsSwitch(t){
  var r=document.getElementById('hqs-r');var s=document.getElementById('hqs-s');
  var tr=document.getElementById('hqtab-r');var ts=document.getElementById('hqtab-s');
  if(t==='r'){
    if(r)r.style.display='block';if(s)s.style.display='none';
    if(tr)tr.className='hqtab on';if(ts)ts.className='hqtab';
    hqsStopScan();
  } else {
    if(r)r.style.display='none';if(s)s.style.display='block';
    if(tr)tr.className='hqtab';if(ts)ts.className='hqtab on';
    hqsLoadContacts();
  }
}
function hqsCopy(){if(!_hqsUrl)return;navigator.clipboard.writeText(_hqsUrl).then(function(){toast('Lien copié !','ok');});}
function hqsShare(){
  if(!user||!_hqsUrl)return;
  var name=(user.prenom||'')+' '+(user.nom||'');
  var text='Envoyez-moi de l'argent via ZAMA\n'+name.trim()+' — '+(user.phone||'')+'\n\n'+_hqsUrl;
  if(navigator.share)navigator.share({title:'Mon QR ZAMA',text:text,url:_hqsUrl}).catch(function(){});
  else navigator.clipboard.writeText(text).then(function(){toast('Copié !','ok');});
}
function hqsWA(){
  if(!user||!_hqsUrl)return;
  var name=(user.prenom||'')+' '+(user.nom||'');
  var msg=encodeURIComponent('Envoyez-moi de l'argent via ZAMA\n'+name.trim()+' — '+(user.phone||'')+'\n'+_hqsUrl);
  window.open('https://wa.me/?text='+msg,'_blank');
}
function hqsToggleScan(){
  if(_hqsStream){hqsStopScan();return;}
  var vid=document.getElementById('hqs-vid');var ph=document.getElementById('hqs-scan-ph');var btn=document.getElementById('hqs-scan-btn');
  if(!navigator.mediaDevices){toast('Caméra non disponible','err');return;}
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(function(s){
    _hqsStream=s;
    if(vid){vid.style.display='block';vid.srcObject=s;}
    if(ph)ph.style.display='none';
    if(btn)btn.textContent='Arrêter le scanner';
    toast('Scanner actif','info');
  }).catch(function(){toast('Caméra refusée','err');});
}
function hqsStopScan(){
  if(_hqsStream){_hqsStream.getTracks().forEach(function(t){t.stop();});_hqsStream=null;}
  var vid=document.getElementById('hqs-vid');if(vid){vid.style.display='none';vid.srcObject=null;}
  var ph=document.getElementById('hqs-scan-ph');if(ph)ph.style.display='block';
  var btn=document.getElementById('hqs-scan-btn');if(btn)btn.textContent='Activer le scanner';
}
function hqsLoadContacts(){
  var list=document.getElementById('hqs-contacts');if(!list)return;
  var benefs=getBenefs().slice(0,5);
  if(!benefs.length){list.innerHTML='<div style="font-size:11px;color:var(--text3);padding:4px 0">Aucun contact récent</div>';return;}
  list.innerHTML=benefs.map(function(b){
    var ini=(b.name||'?')[0].toUpperCase();
    return '<div class="hqs-contact" onclick="hqsSendTo(''+b.name.replace(/'/g,'').replace(/"/g,'')+'',''+b.phone+'',''+b.mm+'')">'
      +'<div class="hqs-cav">'+ini+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">'+b.name+'</div>'
      +'<div style="font-size:11px;color:var(--text3)">'+b.phone+' · '+(b.mm==='wave'?'Wave':'Orange Money')+'</div></div>'
      +'<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="var(--gold)" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9 22,2"/></svg>'
      +'</div>';
  }).join('');
}
function hqsSendTo(name,phone,mm){
  hqsSwitch('r');
  goto('scr-send');
  setTimeout(function(){
    var rn=document.getElementById('r-name');if(rn)rn.value=name||'';
    var rp=document.getElementById('r-phone');if(rp)rp.value=phone||'';
    var mmEl=document.getElementById('mm-'+(mm||'wave'));if(mmEl)selMM(mm||'wave',mmEl);
    toast('Envoyer à '+(name||phone),'info');
  },300);
}
function hqsSendManual(){
  var inp=document.getElementById('hqs-inp');if(!inp||!inp.value.trim())return;
  var val=inp.value.trim();
  var pm=val.match(/pay_phone=([^&]+)/);
  var nm=val.match(/pay_name=([^&]+)/);
  if(pm){hqsSendTo(nm?decodeURIComponent(nm[1]):'',decodeURIComponent(pm[1]),'wave');}
  else{hqsSendTo('',val,'wave');}
  inp.value='';
}
function checkPayPhoneParam(){
  var params=new URLSearchParams(window.location.search);
  var phone=params.get('pay_phone');var name=params.get('pay_name')||'';
  if(phone){goto('scr-send');setTimeout(function(){
    var rn=document.getElementById('r-name');if(rn)rn.value=decodeURIComponent(name);
    var rp=document.getElementById('r-phone');if(rp)rp.value=decodeURIComponent(phone);
    toast('Envoyer à '+(name||phone),'info');
  },400);}
}
