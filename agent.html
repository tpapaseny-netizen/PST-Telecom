<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aida — Agent PST</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080f;--surface:#0d1117;--card:#131820;--border:#1e2a3a;
  --accent:#00d4ff;--accent2:#7c3aed;--green:#10b981;--red:#ef4444;
  --yellow:#f59e0b;--text:#e2e8f0;--muted:#64748b;--soft:#94a3b8;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}

/* CHAT CONTAINER */
.chat-wrap{width:100%;max-width:480px;height:90vh;max-height:700px;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:0 25px 80px rgba(0,0,0,0.6)}

/* HEADER */
.chat-head{padding:16px 20px;background:linear-gradient(135deg,#0d1117 0%,#111827 100%);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.agent-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;position:relative}
.agent-avatar::after{content:'';position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:var(--green);border-radius:50%;border:2px solid var(--surface)}
.agent-info h2{font-size:15px;font-weight:700}
.agent-info p{font-size:11px;color:var(--muted)}
.agent-status{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green)}
.pulse{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

/* MESSAGES */
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.messages::-webkit-scrollbar{width:3px}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.msg{display:flex;gap:8px;max-width:85%;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.agent{align-self:flex-start}

.msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.msg.agent .msg-avatar{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.msg.user .msg-avatar{background:linear-gradient(135deg,#1e40af,#7c3aed)}

.msg-bubble{padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5}
.msg.agent .msg-bubble{background:var(--card);border:1px solid var(--border);border-top-left-radius:4px;color:var(--text)}
.msg.user .msg-bubble{background:linear-gradient(135deg,#1e40af,#2563eb);border-top-right-radius:4px;color:#fff}

.msg-time{font-size:10px;color:var(--muted);margin-top:3px;text-align:right}
.msg.agent .msg-time{text-align:left}

/* TYPING */
.typing{display:flex;gap:4px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:16px;border-top-left-radius:4px;width:fit-content}
.typing span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce .8s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* QUICK REPLIES */
.quick-replies{display:flex;flex-wrap:wrap;gap:6px;padding:8px 16px 0}
.qr-btn{padding:6px 12px;background:transparent;border:1px solid var(--accent);border-radius:20px;color:var(--accent);font-size:11px;font-family:var(--font);cursor:pointer;transition:all .2s;white-space:nowrap}
.qr-btn:hover{background:var(--accent);color:#000;font-weight:600}

/* CARDS */
.card-msg{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:4px}
.card-header{padding:10px 14px;background:linear-gradient(135deg,rgba(0,212,255,.1),rgba(124,58,237,.1));border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--accent)}
.card-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.card-row:last-child{border-bottom:none}
.card-label{color:var(--muted)}
.card-val{font-weight:600}
.card-btn{display:block;margin:10px 14px;padding:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;font-family:var(--font)}

/* INPUT */
.input-area{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;background:var(--surface)}
.input-wrap{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;gap:8px;padding:8px 12px;transition:border-color .2s}
.input-wrap:focus-within{border-color:var(--accent)}
.input-wrap textarea{flex:1;background:none;border:none;color:var(--text);font-family:var(--font);font-size:13px;outline:none;resize:none;max-height:80px;line-height:1.4}
.input-wrap textarea::placeholder{color:var(--muted)}
.send-btn{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s}
.send-btn:hover{opacity:.85}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.send-btn svg{width:16px;height:16px}

/* AGENT INFO BAR */
.info-bar{display:flex;gap:8px;padding:0 16px 8px;flex-shrink:0;flex-wrap:wrap}
.info-chip{font-size:10px;padding:3px 8px;border-radius:10px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);color:var(--accent)}
</style>
</head>
<body>
<div class="chat-wrap">
  <div class="chat-head">
    <div class="agent-avatar">🤖</div>
    <div class="agent-info">
      <h2>Aida — Agent PST</h2>
      <p>Pure Smart Telecom • Assistant intelligent</p>
    </div>
    <div class="agent-status"><div class="pulse"></div>En ligne</div>
  </div>

  <div class="info-bar">
    <div class="info-chip">📞 Appels VoIP</div>
    <div class="info-chip">✉️ SMS Marketing</div>
    <div class="info-chip">⚡ Recharge</div>
    <div class="info-chip">📹 SecurCam</div>
  </div>

  <div class="messages" id="messages"></div>
  <div class="quick-replies" id="quick-replies"></div>
  <div class="input-area">
    <div class="input-wrap">
      <textarea id="user-input" placeholder="Écrivez votre message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
const API_URL = 'https://pst-telecom-production.up.railway.app';
const FORFAITS = {
  starter: { name: 'Starter', minutes: 200, prix: 2990 },
  smart:   { name: 'Smart',   minutes: 300, prix: 5990 },
  business:{ name: 'Business',minutes: 'Illimité', prix: 15990 }
};
const WAVE_ID = 'M_rlEv9b4P3VtG';

let conversation = [];
let userInfo = {};
let step = null;

const SYSTEM_PROMPT = `Tu es Aida, l'agent intelligent de PST — Pure Smart Telecom, un opérateur virtuel sénégalais.

Tu parles en français et en wolof si le client le souhaite. Tu es chaleureux, professionnel et efficace.

PST propose ces services :
1. FORFAITS APPELS VoIP :
   - Starter : 200 min/mois → 2 990 FCFA
   - Smart : 300 min/mois → 5 990 FCFA  
   - Business : Illimité → 15 990 FCFA

2. SMS MARKETING : Envoi en masse pour écoles, entreprises, associations
   - Starter : 100 SMS → 1 500 FCFA
   - Pro : 1 000 SMS → 10 000 FCFA
   - Business : 5 000 SMS → 40 000 FCFA
   - École : 10 000 SMS → 75 000 FCFA

3. SMS VÉRIFICATION : Numéros temporaires pour Google, WhatsApp, TikTok, Facebook
   - 1 000 FCFA = 5 points

4. RECHARGE TÉLÉPHONIQUE : Orange (77,78,71), Free (76), Expresso (70)
   - Sans frais supplémentaires

5. PST SECURCAM : Surveillance caméras à distance pour entreprises, écoles, hôpitaux
   - Gestion 24h/24 depuis notre salle de supervision

Paiement : Wave uniquement (lien généré automatiquement)

Quand quelqu'un veut s'inscrire à un forfait, demande :
- Son prénom et nom
- Son numéro de téléphone (+221XXXXXXXXX)
- Le forfait choisi
Puis génère le lien Wave correspondant.

Réponds toujours de manière concise (max 3-4 lignes). Si la demande est complexe, propose d'appeler le +221771520959.

IMPORTANT: Pour les actions concrètes (inscription, paiement), dis clairement ce que le client doit faire étape par étape.`;

async function callClaude(userMessage) {
  conversation.push({ role: 'user', content: userMessage });
  
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversation
      })
    });
    
    const data = await response.json();
    const reply = data.content?.[0]?.text || "Désolé, je n'ai pas pu traiter votre demande.";
    conversation.push({ role: 'assistant', content: reply });
    return reply;
  } catch(e) {
    return "Je rencontre une difficulté technique. Appelez-nous au +221 77 152 09 59.";
  }
}

function addMessage(text, sender, extras) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${sender}`;
  
  const time = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
  const avatar = sender === 'agent' ? '🤖' : '👤';
  
  let content = `<div class="msg-avatar">${avatar}</div>
    <div>
      <div class="msg-bubble">${formatText(text)}</div>
      <div class="msg-time">${time}</div>
      ${extras || ''}
    </div>`;
  
  div.innerHTML = content;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>')
    .replace(/`(.*?)`/g, '<code style="background:rgba(0,212,255,.1);padding:1px 4px;border-radius:3px;font-size:11px">$1</code>');
}

function showTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg agent';
  div.id = 'typing';
  div.innerHTML = `<div class="msg-avatar">🤖</div>
    <div class="typing"><span></span><span></span><span></span></div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  document.getElementById('typing')?.remove();
}

function setQuickReplies(options) {
  const qr = document.getElementById('quick-replies');
  qr.innerHTML = options.map(o => 
    `<button class="qr-btn" onclick="quickReply('${o}')">${o}</button>`
  ).join('');
}

function quickReply(text) {
  document.getElementById('quick-replies').innerHTML = '';
  addMessage(text, 'user');
  processMessage(text);
}

function generateWaveCard(forfait, nom, telephone) {
  const f = FORFAITS[forfait.toLowerCase()] || FORFAITS.smart;
  const amount = f.prix;
  const waveLink = `https://pay.wave.com/m/${WAVE_ID}/c/sn/?amount=${amount}`;
  
  return `<div class="card-msg">
    <div class="card-header">💳 Paiement Forfait ${f.name}</div>
    <div class="card-row"><span class="card-label">Client</span><span class="card-val">${nom}</span></div>
    <div class="card-row"><span class="card-label">Téléphone</span><span class="card-val">${telephone}</span></div>
    <div class="card-row"><span class="card-label">Forfait</span><span class="card-val">${f.name} — ${f.minutes} min</span></div>
    <div class="card-row"><span class="card-label">Montant</span><span class="card-val" style="color:var(--accent)">${f.prix.toLocaleString()} FCFA</span></div>
    <a href="${waveLink}" target="_blank" class="card-btn">💚 Payer via Wave maintenant</a>
  </div>`;
}

async function processMessage(text) {
  document.getElementById('send-btn').disabled = true;
  showTyping();
  
  // Check if message contains registration info
  const hasPhone = text.match(/(\+221|00221)?[0-9]{9}/);
  const hasForfait = /starter|smart|business/i.test(text);
  
  const reply = await callClaude(text);
  removeTyping();
  
  // Detect if Claude wants to generate a Wave link
  let extras = '';
  if ((hasForfait || reply.toLowerCase().includes('wave') || reply.toLowerCase().includes('payer')) && hasPhone) {
    const forfait = text.match(/starter|smart|business/i)?.[0] || 'smart';
    const phone = hasPhone[0];
    const nameMatch = text.match(/(?:je suis|m'appelle|appelle)\s+([A-Za-zÀ-ÿ\s]+)/i);
    const nom = nameMatch ? nameMatch[1].trim() : 'Client PST';
    extras = generateWaveCard(forfait, nom, phone);
  }
  
  addMessage(reply, 'agent', extras);
  
  // Set contextual quick replies
  if (reply.toLowerCase().includes('forfait') || reply.toLowerCase().includes('abonnement')) {
    setQuickReplies(['📞 Forfait Starter 2990F', '📱 Forfait Smart 5990F', '💼 Forfait Business', '❓ Plus d\'infos']);
  } else if (reply.toLowerCase().includes('sms')) {
    setQuickReplies(['📩 SMS Marketing', '🔐 SMS Vérification', '⬅️ Retour']);
  } else if (reply.toLowerCase().includes('recharge')) {
    setQuickReplies(['🟠 Orange', '🔴 Free', '🔵 Expresso', '⬅️ Retour']);
  } else {
    setQuickReplies(['📞 Forfaits appels', '📩 SMS Marketing', '⚡ Recharge', '📹 SecurCam', '💬 Parler à un humain']);
  }
  
  document.getElementById('send-btn').disabled = false;
}

async function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('quick-replies').innerHTML = '';
  
  addMessage(text, 'user');
  await processMessage(text);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

// Welcome message
window.addEventListener('load', () => {
  setTimeout(() => {
    addMessage("Bonjour ! 👋 Je suis **Aida**, votre agent PST intelligent.\n\nJe peux vous aider à :\n• Choisir un forfait appels\n• Lancer une campagne SMS\n• Recharger votre téléphone\n• Configurer la surveillance caméra\n\nComment puis-je vous aider aujourd'hui ?", 'agent');
    setQuickReplies(['📞 Forfaits appels', '📩 SMS Marketing', '⚡ Recharge téléphone', '📹 SecurCam', '💬 En savoir plus']);
  }, 500);
});
</script>
</body>
</html>
